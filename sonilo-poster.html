<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sonilo — Instagram Poster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ---- Palette: three colors, one near-neutral ---- */
  :root {
    --paper: #F1EDE3;  /* near-neutral warm paper (background) */
    --ink:   #17160F;  /* near-black ink */
    --accent:#FF4B1F;  /* single vivid accent */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #2b2b2b;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: "Space Grotesk", sans-serif;
  }

  /* ---- Fixed canvas: 1080 x 1350 (4:5) ---- */
  .poster {
    width: 1080px;
    height: 1350px;
    background: var(--paper);
    color: var(--ink);
    padding: 96px 88px 100px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    position: relative;
  }

  /* ---- Top block: wordmark + headline ---- */
  .top { display: flex; flex-direction: column; gap: 52px; }

  .wordmark { display: flex; align-items: center; gap: 16px; }
  .mark {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
  }
  .wordmark .name { font-size: 34px; font-weight: 700; letter-spacing: -0.02em; }

  .headline {
    font-weight: 700;
    font-size: 128px;
    line-height: 0.92;
    letter-spacing: -0.045em;
  }
  .headline .beat { display: block; }
  .headline .payoff { display: block; color: var(--accent); font-size: 150px; margin-top: 6px; }

  /* ---- Trumpet (abstract, bleeds in from the left) ---- */
  .trumpet { position: absolute; left: -46px; top: 604px; width: 640px; height: 460px; }

  /* ---- Words blown out of the bell ---- */
  .blown {
    position: absolute;
    left: 612px; top: 706px;
    transform: rotate(-4deg);
    transform-origin: left center;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 0.88;
  }
  .blown span { display: block; }
  .blown .b1 { font-size: 118px; color: var(--accent); }
  .blown .b2 { font-size: 96px; color: var(--ink); margin-left: 22px; }
  .blown .b3 { font-size: 96px; color: var(--ink); margin-left: 50px; }

  /* ---- Music notes (decoration) ---- */
  .note { position: absolute; }

  /* ---- Subhead (quiet, one line, bottom) ---- */
  .subhead {
    font-size: 30px; font-weight: 500;
    letter-spacing: -0.005em; line-height: 1.3;
    color: rgba(23,22,15,0.72);
    max-width: 820px;
  }
</style>
</head>
<body>
  <div class="poster">

    <!-- Top: wordmark + headline -->
    <div class="top">
      <header class="wordmark">
        <span class="mark" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M3 2.5 L15 9 L3 15.5 Z" fill="#F1EDE3"/>
          </svg>
        </span>
        <span class="name">Sonilo</span>
      </header>

      <h1 class="headline">
        <span class="beat">See it.</span>
        <span class="beat">Hear it.</span>
        <span class="payoff">Instantly.</span>
      </h1>
    </div>

    <!-- Abstract trumpet -->
    <div class="trumpet" aria-hidden="true">
      <svg width="640" height="460" viewBox="0 0 640 460">
        <!-- tuning-slide U loop (behind body) -->
        <path d="M120 300 C120 432 272 432 272 300" fill="none"
              stroke="#FF4B1F" stroke-width="42" stroke-linecap="round"/>
        <!-- main body tube (bleeds off left) -->
        <rect x="-60" y="220" width="410" height="82" rx="41" fill="#FF4B1F"/>
        <!-- bell flare (concave trumpet curve) -->
        <path d="M322 222 C430 206 505 172 560 116 L560 384 C505 328 430 294 322 300 Z" fill="#FF4B1F"/>
        <!-- bell rim (paper) + opening (ink) -->
        <ellipse cx="560" cy="250" rx="30" ry="134" fill="#F1EDE3"/>
        <ellipse cx="562" cy="250" rx="12" ry="108" fill="#17160F"/>
        <!-- valve stems -->
        <rect x="150" y="150" width="30" height="82" rx="10" fill="#FF4B1F"/>
        <rect x="205" y="150" width="30" height="82" rx="10" fill="#FF4B1F"/>
        <rect x="260" y="150" width="30" height="82" rx="10" fill="#FF4B1F"/>
        <!-- valve caps -->
        <circle cx="165" cy="150" r="16" fill="#17160F"/>
        <circle cx="220" cy="150" r="16" fill="#17160F"/>
        <circle cx="275" cy="150" r="16" fill="#17160F"/>
        <!-- small detail dots -->
        <circle cx="500" cy="182" r="9" fill="#17160F"/>
        <circle cx="470" cy="330" r="7" fill="#17160F"/>
      </svg>
    </div>

    <!-- Words blown from the bell -->
    <div class="blown" aria-label="4x faster now">
      <span class="b1">4&times;</span>
      <span class="b2">faster</span>
      <span class="b3">now</span>
    </div>

    <!-- Music notes -->
    <!-- blown from the bell -->
    <div class="note" style="left:524px; top:700px;">
      <svg width="76" height="60" viewBox="0 0 76 60" fill="#17160F">
        <rect x="18" y="14" width="5" height="36"/>
        <rect x="66" y="8" width="5" height="34"/>
        <path d="M18 14 L71 7 L71 19 L18 26 Z"/>
        <ellipse cx="11" cy="50" rx="12.5" ry="9.5" transform="rotate(-20 11 50)"/>
        <ellipse cx="59" cy="42" rx="12.5" ry="9.5" transform="rotate(-20 59 42)"/>
      </svg>
    </div>
    <div class="note" style="left:566px; top:980px;">
      <svg width="44" height="66" viewBox="0 0 44 66" fill="#17160F">
        <rect x="22" y="8" width="5" height="42"/>
        <path d="M27 8 C41 12 42 28 33 38 C39 26 32 18 27 22 Z"/>
        <ellipse cx="14" cy="50" rx="13" ry="9.5" transform="rotate(-20 14 50)"/>
      </svg>
    </div>
    <!-- decoration around the poster -->
    <div class="note" style="left:946px; top:150px; transform:rotate(12deg);">
      <svg width="44" height="66" viewBox="0 0 44 66" fill="#17160F">
        <rect x="22" y="8" width="5" height="42"/>
        <path d="M27 8 C41 12 42 28 33 38 C39 26 32 18 27 22 Z"/>
        <ellipse cx="14" cy="50" rx="13" ry="9.5" transform="rotate(-20 14 50)"/>
      </svg>
    </div>
    <div class="note" style="left:940px; top:470px; transform:rotate(-8deg);">
      <svg width="76" height="60" viewBox="0 0 76 60" fill="#17160F">
        <rect x="18" y="14" width="5" height="36"/>
        <rect x="66" y="8" width="5" height="34"/>
        <path d="M18 14 L71 7 L71 19 L18 26 Z"/>
        <ellipse cx="11" cy="50" rx="12.5" ry="9.5" transform="rotate(-20 11 50)"/>
        <ellipse cx="59" cy="42" rx="12.5" ry="9.5" transform="rotate(-20 59 42)"/>
      </svg>
    </div>
    <div class="note" style="left:958px; top:1120px; transform:rotate(-14deg);">
      <svg width="44" height="66" viewBox="0 0 44 66" fill="#17160F">
        <rect x="22" y="8" width="5" height="42"/>
        <path d="M27 8 C41 12 42 28 33 38 C39 26 32 18 27 22 Z"/>
        <ellipse cx="14" cy="50" rx="13" ry="9.5" transform="rotate(-20 14 50)"/>
      </svg>
    </div>

    <!-- Subhead -->
    <p class="subhead">Custom music and SFX for any video. Copyright-free.</p>

  </div>
</body>
</html>

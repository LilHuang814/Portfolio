<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sonilo — Instagram Poster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ---- Palette: three colors, one near-neutral ---- */
  :root {
    --paper: #F1EDE3;  /* near-neutral warm paper (background) */
    --ink:   #17160F;  /* near-black ink (primary type + slow bar) */
    --accent:#FF4B1F;  /* single vivid accent (the payoff)      */
    --muted: #DFDACB;  /* paper-tinted fill for the "before" bar */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #2b2b2b;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: "Space Grotesk", sans-serif;
  }

  /* ---- Fixed canvas: 1080 x 1350 (4:5) ---- */
  .poster {
    width: 1080px;
    height: 1350px;
    background: var(--paper);
    color: var(--ink);
    padding: 96px 88px 100px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }

  /* ---- Wordmark (signature, top) ---- */
  .wordmark {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .mark {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wordmark .name {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  /* ---- Headline + proof composed as one unit ---- */
  .stage { display: flex; flex-direction: column; gap: 72px; }

  .headline {
    font-weight: 700;
    font-size: 132px;
    line-height: 0.92;
    letter-spacing: -0.045em;
  }
  .headline .beat { display: block; }
  .headline .payoff {
    display: block;
    color: var(--accent);
    font-size: 156px;
    margin-top: 6px;
  }

  /* ---- Proof: render-time comparison (the single central image) ---- */
  .proof { display: flex; flex-direction: column; gap: 26px; }

  .proof-label {
    font-family: "Space Mono", monospace;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(23,22,15,0.55);
  }

  .metric { display: flex; flex-direction: column; gap: 12px; }

  .tag {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: rgba(23,22,15,0.6);
  }
  .tag.now { color: var(--accent); }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .bar {
    height: 62px;
    border-radius: 31px;
  }
  .bar.old { width: 648px; background: var(--muted); }
  .bar.new { width: 162px; background: var(--accent); }

  .tc {
    font-family: "Space Mono", monospace;
    font-weight: 700;
    font-size: 56px;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .tc.now { color: var(--accent); }

  /* the speed gain fills the space the old render used to occupy */
  .mult {
    font-weight: 700;
    font-size: 76px;
    letter-spacing: -0.03em;
    color: var(--accent);
    margin-left: 12px;
    white-space: nowrap;
  }

  /* ---- Subhead (quiet, one line, bottom) ---- */
  .subhead {
    font-size: 30px;
    font-weight: 500;
    letter-spacing: -0.005em;
    line-height: 1.3;
    color: rgba(23,22,15,0.72);
    max-width: 820px;
  }
</style>
</head>
<body>
  <div class="poster">

    <!-- Wordmark -->
    <header class="wordmark">
      <span class="mark" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 2.5 L15 9 L3 15.5 Z" fill="#F1EDE3"/>
        </svg>
      </span>
      <span class="name">Sonilo</span>
    </header>

    <!-- Headline + Proof: one composed unit -->
    <div class="stage">

      <h1 class="headline">
        <span class="beat">See it.</span>
        <span class="beat">Hear it.</span>
        <span class="payoff">Instantly.</span>
      </h1>

      <section class="proof">
        <div class="proof-label">Audio render time</div>

        <div class="metric">
          <span class="tag">Old model</span>
          <div class="bar-row">
            <div class="bar old"></div>
            <span class="tc">2:00</span>
          </div>
        </div>

        <div class="metric">
          <span class="tag now">Sonilo now</span>
          <div class="bar-row">
            <div class="bar new"></div>
            <span class="tc now">0:30</span>
            <span class="mult">4&times; faster</span>
          </div>
        </div>
      </section>

    </div>

    <!-- Subhead -->
    <p class="subhead">Custom music and SFX for any video. Copyright-free.</p>

  </div>
</body>
</html>
